se, "desc": ""}, {"text": "The backend enforcement is surprisingly thorough. Most core entities (`campaigns`, `contacts`, `templates`, `settings`, `domains`, `team`) use `require_permission` consistently.", "done": false, "desc": ""}, {"text": "**Risk:** Some older helper routes or webhooks might bypass RBAC, but they are protected by signature verification (e.g., SNS webhooks).", "done": false, "desc": ""}, {"text": "Consolidate legacy `require_admin_or_owner` into the `require_permission` dictionary system for uniformity.", "done": false, "desc": ""}, {"text": "**Major shifts detected:**", "done": false, "desc": ""}, {"text": "**Database Access:** Shifted from purely using Supabase PostgREST (via `supabase-py`) to integrating `asyncpg` for direct, high-performance Postgres connection pooling. This was required for setting transaction-level RLS context (`SET LOCAL app.current_tenant_id`) during background worker execution.", "done": false, "desc": ""}, {"text": "**Messaging:** Heavy reliance on RabbitMQ (`aio-pika`) for all heavy lifting (CSV processing, Email dispatch).", "done": false, "desc": ""}, {"text": "**Caching/State:** Redis is critical infrastructure, handling rate-limiting (`slowapi`), distributed locking for idempotency, and WebSockets Pub/Sub for real-time import progress.", "done": false, "desc": ""}, {"text": "**Current architecture (real):**", "done": false, "desc": ""}, {"text": "FastAPI (Gateway) -> Supabase (Auth/DB) -> RabbitMQ (Message Broker) -> Standalone Python Workers -> AWS SES / Gmail.", "done": false, "desc": ""}, {"text": "**Risk areas:**", "done": false, "desc": ""}, {"text": "The embedded scheduler in `platform/api/main.py` will cause double-dispatch if multiple API replicas are deployed. It must be disabled in production in favor of the standalone worker with Redis locks.", "done": false, "desc": ""}, {"text": "**Scalability readiness:**", "done": false, "desc": ""}, {"text": "High. The streaming chunk parser and worker queues mean the API node memory footprint remains small regardless of tenant data size.", "done": false, "desc": ""}, {"text": "**Design system vs actual usage:**", "done": false, "desc": ""}, {"text": "The `shadcn/ui` system is implemented successfully. Complex components like DataTables and Modals adhere strictly to the design system.", "done": false, "desc": ""}, {"text": "**UX inconsistencies:**", "done": false, "desc": ""}, {"text": "Minor. The onboarding flow was recently refactored to resolve a \"ghost workspace\" trap, improving multi-tenant navigation significantly.", "done": false, "desc": ""}, {"text": "**Missing critical states:**", "done": false, "desc": ""}, {"text": "Overall excellent coverage of empty states (`EmptyState` component) and loading spinners across primary entities.", "done": false, "desc": ""}]}];
        const savedState = JSON.parse(localStorage.getItem('shrflow_phases_tracker') || '{}');

            document.getElementById('master-completed').textContent = completedTasks;

            const pCard = document.createElement('div');
            pCard.className = 'glass rounded-2xl p-6 shadow-xl transition-all duration-300 hover:border-indigo-500/30';
            
            let phaseCompleted = 0;
            const taskHeader = document.createElement('div');
            taskHeader.className = 'flex flex-col sm:flex-row justify-between sm:items-center mb-5 border-b border-zinc-800 pb-4 gap-2';

            pCard.appendChild(taskHeader);
            
            const taskList = document.createElement('div');

                if (isChecked) { completedTasks++; phaseCompleted++; }
                
                const tDiv = document.createElement('div');
                tDiv.className = 'flex items-start gap-4 p-3 rounded-xl hover:bg-zinc-800/50 transition-colors group';
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.id = taskId;
                checkbox.checked = isChecked;
                checkbox.className = 'mt-1 w-5 h-5 text-indigo-500 bg-zinc-900 border-zinc-700 rounded-md focus:ring-indigo-500 focus:ring-2 focus:ring-offset-2 focus:ring-offset-zinc-900 cursor-pointer transition-all';
                
                checkbox.addEventListener('change', (e) => {
                    savedState[taskId] = e.target.checked;
                    localStorage.setItem('shrflow_phases_tracker', JSON.stringify(savedState));
                    if(e.target.checked) { completedTasks++; phaseCompleted++; } 
                    else { completedTasks--; phaseCompleted--; }
                    updateMasterStats();
                    document.getElementById(`stat-${pIndex}`).textContent = `${phaseCompleted} / ${phase.tasks.length} DONE`;
                    label.classList.toggle('line-through', e.target.checked);
                    label.classList.toggle('text-zinc-500', e.target.checked);
                    label.classList.toggle('text-zinc-200', !e.target.checked);
                    if (desc) desc.classList.toggle('opacity-40', e.target.checked);
                });
                
                const labelWrap = document.createElement('div');
                labelWrap.className = 'flex-1 min-w-0';

            container.appendChild(pCard);
            document.getElementById(`stat-${pIndex}`).textContent = `${phaseCompleted} / ${phase.tasks.length} DONE`;
        });
        
        updateMasterStats();
