# ============================================================
# Email Engine вЂ” Docker Compose
# Development & Production Orchestration
#
# Usage:
#   Start all services:  docker-compose up --build
#   Stop all services:   docker-compose down
#   View logs:           docker-compose logs -f [service]
#
# Services:
#   api                      в†’ FastAPI backend          в†’ http://localhost:8000
#   email_sender             в†’ Email sending worker     в†’ (background process)
#   import_worker            в†’ Contact import worker    в†’ (background process)
#   background_worker        в†’ Misc queue tasks         в†’ (background process)
#   scheduler                в†’ Campaign scheduler       в†’ (background process)
#   centralized_email_worker в†’ System notification mail в†’ (background process)
#   client                   в†’ Next.js frontend         в†’ http://localhost:3000
#   nginx                    в†’ Reverse proxy            в†’ http://localhost:80 (production)
# ============================================================

services:

  # в”Ђв”Ђ Backend API в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  api:
    build:
      context: .
      dockerfile: deploy/api/Dockerfile
    container_name: email_engine_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT}
    volumes:
      - ./platform/api/assets:/app/assets # Persist uploaded files
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - email_engine_net

  # в”Ђв”Ђ Email Sender Worker в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  email_sender:
    build:
      context: .
      dockerfile: deploy/worker/Dockerfile
    container_name: email_engine_email_sender
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - WORKER_PREFETCH_COUNT=10
      - WORKER_MAX_RETRIES=3
    command: python email_sender.py
    depends_on:
      api:
        condition: service_healthy
    networks:
      - email_engine_net

  # в”Ђв”Ђ Contact Import Worker в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # REQUIRED: This worker MUST be running or contact imports
  # will stay "pending" forever. It uses a robust S3 streaming
  # pipeline with pandas-based parsing and chunked bulk upserts.
  import_worker:
    build:
      context: .
      dockerfile: deploy/worker/Dockerfile
    container_name: email_engine_import_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - IMPORT_QUEUE_NAME=import_tasks_v4
    command: python import_worker.py
    depends_on:
      api:
        condition: service_healthy
    networks:
      - email_engine_net

  # в”Ђв”Ђ Background Worker (handles misc queue tasks) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  background_worker:
    build:
      context: .
      dockerfile: deploy/worker/Dockerfile
    container_name: email_engine_background_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - RABBITMQ_URL=${RABBITMQ_URL}
    command: python background_worker.py
    depends_on:
      api:
        condition: service_healthy
    networks:
      - email_engine_net

  # в”Ђв”Ђ Scheduler в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  scheduler:
    build:
      context: .
      dockerfile: deploy/worker/Dockerfile
    container_name: email_engine_scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - RABBITMQ_URL=${RABBITMQ_URL}
    command: python scheduler.py
    depends_on:
      api:
        condition: service_healthy
    networks:
      - email_engine_net

  # в”Ђв”Ђ Centralized System Email Worker в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  centralized_email_worker:
    build:
      context: .
      dockerfile: deploy/worker/Dockerfile
    container_name: email_engine_centralized_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SYSTEM_SMTP_HOST=${SYSTEM_SMTP_HOST}
      - SYSTEM_SMTP_PORT=${SYSTEM_SMTP_PORT}
      - SYSTEM_SMTP_USERNAME=${SYSTEM_SMTP_USERNAME}
      - SYSTEM_SMTP_PASSWORD=${SYSTEM_SMTP_PASSWORD}
      - SYSTEM_SMTP_FROM_EMAIL=${SYSTEM_SMTP_FROM_EMAIL}
      - SYSTEM_SMTP_FROM_NAME=${SYSTEM_SMTP_FROM_NAME}
    command: python centralized_email_worker.py
    depends_on:
      api:
        condition: service_healthy
    networks:
      - email_engine_net

  # в”Ђв”Ђ Mailhog Development SMTP в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # CURRENTLY DISABLED вЂ” uncomment for local SMTP testing
  # mailhog:
  #   image: mailhog/mailhog
  #   container_name: email_engine_mailhog
  #   restart: unless-stopped
  #   ports:
  #     - "1025:1025" # SMTP endpoint
  #     - "8025:8025" # Web UI endpoint
  #   networks:
  #     - email_engine_net

  # в”Ђв”Ђ Frontend в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  client:
    build:
      context: .
      dockerfile: deploy/client/Dockerfile
    container_name: email_engine_client
    restart: unless-stopped
    ports:
      - "3000:3000"
    extra_hosts:
      - "localhost:host-gateway"
    env_file:
      - .env
    depends_on:
      - api
    networks:
      - email_engine_net

  # в”Ђв”Ђ Nginx Reverse Proxy в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Uncomment in production to route everything through port 80
  # nginx:
  #   image: nginx:alpine
  #   container_name: email_engine_nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #   depends_on:
  #     - api
  #     - client
  #   networks:
  #     - email_engine_net

# в”Ђв”Ђ Shared Network в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
networks:
  email_engine_net:
    driver: bridge

